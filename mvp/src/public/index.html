<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fradema · MVP — Captação de Leads</title>
<style>
  :root {
    --bg: #EEF2F8; --surface: #fff; --surface-2: #E7EDF5; --ink: #101F36; --ink-soft: #47597A;
    --line: #D5DEEA; --navy: #383D6B; --accent: #0F9A6A; --accent-soft: #E3F4EC;
    --gold: #B67C1E; --danger: #C4453B; --wa: #22a25a;
    --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font); }
  header { background: var(--navy); color: #fff; padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  header .brand { display: flex; align-items: center; gap: 12px; }
  header .brand b { font-size: 18px; letter-spacing: .01em; }
  header .brand small { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; opacity: .7; }
  .mark { width: 34px; height: 34px; border-radius: 8px; background: #fff; color: var(--navy); display: grid; place-items: center; font-weight: 700; font-family: Georgia, serif; }
  .status-pill { font-family: var(--mono); font-size: 12px; padding: 6px 12px; border-radius: 999px; display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,.12); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #e0b23c; }
  .dot.on { background: #37d17f; box-shadow: 0 0 0 3px rgba(55,209,127,.25); }
  main { max-width: 1180px; margin: 0 auto; padding: 22px; display: grid; gap: 20px; }
  .row { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; }
  @media (max-width: 820px){ .row { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 18px; box-shadow: 0 8px 24px -16px rgba(16,31,54,.4); }
  .card h2 { margin: 0 0 12px; font-size: 15px; }
  .label { font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); }
  #qrbox { text-align: center; }
  #qrbox img { width: 220px; height: 220px; border-radius: 10px; border: 1px solid var(--line); }
  #qrbox .ok { color: var(--accent); font-weight: 600; padding: 24px 8px; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .stat { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 10px; text-align: center; }
  .stat b { font-size: 22px; display: block; }
  .stat span { font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-soft); }
  input, button { font-family: var(--font); font-size: 14px; }
  input { width: 100%; padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; margin-bottom: 8px; background: var(--surface); color: var(--ink); }
  button.primary { background: var(--accent); color: #fff; border: none; padding: 10px 14px; border-radius: 9px; cursor: pointer; font-weight: 600; width: 100%; }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }
  .hint { font-size: 12px; color: var(--ink-soft); margin: 8px 0 0; }
  .kanban { display: grid; grid-template-columns: repeat(5, minmax(180px,1fr)); gap: 10px; overflow-x: auto; }
  .col { background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 10px; min-width: 180px; }
  .col > .ch { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-soft); display: flex; justify-content: space-between; margin: 2px 4px 10px; }
  .col.quente > .ch { color: var(--danger); }
  .lead { background: var(--surface); border: 1px solid var(--line); border-radius: 9px; padding: 10px; margin-bottom: 8px; font-size: 13px; }
  .lead h4 { margin: 0 0 4px; font-size: 13.5px; }
  .lead .kv { font-family: var(--mono); font-size: 10.5px; color: var(--ink-soft); line-height: 1.7; }
  .lead .meet { margin-top: 6px; font-size: 11px; color: var(--accent); font-weight: 600; }
  .lead .msg { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--line); font-size: 11.5px; color: var(--ink-soft); font-style: italic; }
  .badge { font-family: var(--mono); font-size: 9px; text-transform: uppercase; padding: 2px 6px; border-radius: 6px; background: var(--surface-2); color: var(--ink-soft); }
  .badge.outbound { background: var(--gold); color: #fff; }
  .empty { color: var(--ink-soft); font-size: 12px; padding: 6px; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="mark">F</span>
    <span><b>Fradema</b><small>MVP · Captação de Leads</small></span>
  </div>
  <span class="status-pill"><span class="dot" id="dot"></span><span id="statusText">verificando…</span></span>
</header>

<main>
  <div class="row">
    <div style="display:grid; gap:20px;">
      <div class="card">
        <h2>Conexão WhatsApp</h2>
        <div id="qrbox"><p class="hint">carregando…</p></div>
      </div>
      <div class="card">
        <h2>Prospecção (outbound)</h2>
        <input id="nome" placeholder="Nome do contato (opcional)">
        <input id="empresa" placeholder="Empresa (opcional)">
        <input id="numero" placeholder="Número com DDI+DDD (ex.: 5521999998888)">
        <button class="primary" id="btnSend">Abordar por WhatsApp</button>
        <p class="hint" id="sendMsg">A IA gera a 1ª mensagem e inicia a conversa.</p>
      </div>
    </div>

    <div class="card">
      <h2>Funil de leads</h2>
      <div class="stats" id="stats"></div>
      <div style="height:14px"></div>
      <div class="kanban" id="kanban"></div>
    </div>
  </div>
</main>

<script>
  const stages = [
    { key: 'novo', label: 'Novo' },
    { key: 'qualificando', label: 'Qualificando' },
    { key: 'quente', label: '🔥 Quente', cls: 'quente' },
    { key: 'morno', label: 'Morno' },
    { key: 'frio', label: 'Frio' },
  ];

  async function refresh() {
    try {
      const [st, leads] = await Promise.all([
        fetch('/api/status').then(r => r.json()),
        fetch('/api/leads').then(r => r.json()),
      ]);
      renderStatus(st);
      renderStats(st.stats);
      renderKanban(leads);
    } catch (e) { /* silencioso */ }
  }

  function renderStatus(st) {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('statusText');
    const box = document.getElementById('qrbox');
    const btn = document.getElementById('btnSend');
    if (st.connected) {
      dot.classList.add('on'); txt.textContent = 'WhatsApp conectado';
      box.innerHTML = '<p class="ok">✓ Conectado. Pronto para receber e enviar mensagens.</p>';
      btn.disabled = false;
    } else {
      dot.classList.remove('on'); txt.textContent = 'Aguardando conexão';
      btn.disabled = true;
      if (st.qr) {
        box.innerHTML = '<p class="label">Escaneie no WhatsApp → Aparelhos conectados</p><img src="' + st.qr + '" alt="QR">';
      } else {
        box.innerHTML = '<p class="hint">Gerando QR code…</p>';
      }
    }
  }

  function renderStats(s) {
    if (!s) return;
    const cells = [
      ['total','Total'], ['quente','Quentes'], ['agendados','Agendados'],
    ];
    document.getElementById('stats').innerHTML = cells.map(([k,l]) =>
      '<div class="stat"><b>' + (s[k] ?? 0) + '</b><span>' + l + '</span></div>').join('');
  }

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  function renderKanban(leads) {
    const byStage = {};
    stages.forEach(s => byStage[s.key] = []);
    (leads || []).forEach(l => { (byStage[l.stage] || (byStage[l.stage] = [])).push(l); });
    document.getElementById('kanban').innerHTML = stages.map(s => {
      const items = byStage[s.key] || [];
      const cards = items.length ? items.map(cardHtml).join('') : '<div class="empty">—</div>';
      return '<div class="col ' + (s.cls || '') + '"><div class="ch"><span>' + s.label + '</span><span>' + items.length + '</span></div>' + cards + '</div>';
    }).join('');
  }

  function cardHtml(l) {
    const d = l.data || {};
    const nome = d.nome || d.empresa || l.numero;
    const linha2 = [d.regime, d.faturamento].filter(Boolean).join(' · ');
    const linha3 = [d.segmento, d.dividas ? 'dívida: ' + d.dividas : ''].filter(Boolean).join(' · ');
    const last = (l.lastMessages || []).filter(m => m.role === 'user').slice(-1)[0];
    return '<div class="lead">' +
      '<span class="badge ' + (l.origem === 'outbound' ? 'outbound' : '') + '">' + esc(l.origem || 'inbound') + '</span>' +
      '<h4>' + esc(nome) + '</h4>' +
      '<div class="kv">' + esc(l.numero) + (linha2 ? '<br>' + esc(linha2) : '') + (linha3 ? '<br>' + esc(linha3) : '') + '</div>' +
      (l.meeting ? '<div class="meet">📅 ' + esc(l.meeting) + '</div>' : '') +
      (last ? '<div class="msg">“' + esc(last.text).slice(0,80) + '”</div>' : '') +
      '</div>';
  }

  document.getElementById('btnSend').addEventListener('click', async () => {
    const numero = document.getElementById('numero').value;
    const nome = document.getElementById('nome').value;
    const empresa = document.getElementById('empresa').value;
    const msg = document.getElementById('sendMsg');
    if (!numero) { msg.textContent = 'Informe o número.'; return; }
    msg.textContent = 'Enviando…';
    try {
      const r = await fetch('/api/outbound', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ numero, nome, empresa }),
      });
      const data = await r.json();
      msg.textContent = r.ok ? '✓ Mensagem enviada!' : ('Erro: ' + (data.error || ''));
      if (r.ok) { document.getElementById('numero').value = ''; refresh(); }
    } catch (e) { msg.textContent = 'Falha ao enviar.'; }
  });

  refresh();
  setInterval(refresh, 3000);
</script>
</body>
</html>
